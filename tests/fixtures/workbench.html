<!doctype html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>HeliosLab Workbench</title>
		<style>
			.sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}
			:focus {
				outline: 2px solid #4a9eff;
				outline-offset: 2px;
			}
			#editor-pane {
				min-height: 200px;
			}
			.monaco-editor {
				display: block;
				min-height: 200px;
				min-width: 200px;
			}
		</style>
	</head>
	<body>
		<a id="skip-to-main" href="#main">Skip to main content</a>
		<a id="skip-to-file-tree" href="#file-tree">Skip to file tree</a>
		<a id="skip-to-editor" href="#editor-pane">Skip to editor</a>
		<div id="workbench-container">
			<header id="topbar" role="banner">
				<button id="new-file-btn" type="button" aria-label="New file">New</button>
				<button id="open-file-btn" type="button" aria-label="Open file">Open</button>
			</header>
			<aside id="file-tree" role="tree" aria-label="Files">
				<div role="treeitem" aria-expanded="false" aria-level="1">src</div>
				<div role="treeitem" aria-expanded="false" aria-level="1">tests</div>
			</aside>
			<main id="main" tabindex="-1">
				<section id="editor-pane" aria-label="Code editor">
					<div
						class="monaco-editor"
						role="textbox"
						aria-label="Code editor. Use arrow keys to navigate, type to edit."
						aria-multiline="true"
						tabindex="0"
					></div>
				</section>
			</main>
			<footer id="statusbar" role="contentinfo">
				<span>Ready</span>
			</footer>
			<div id="sr-live" class="sr-only" aria-live="polite" aria-atomic="true" role="status"></div>
			<div id="sr-alert" class="sr-only" aria-live="assertive" aria-atomic="true" role="alert"></div>
		</div>
		<script>
			// The a11y fixture is a static HTML stand-in for the live
			// HeliosLab renderer. The real Monaco editor surfaces its
			// accessibility tree at runtime; here we render a labelled
			// textbox element with `tabindex="0"` so the e2e specs can
			// exercise the focus / aria-label contract. The tab-order
			// spec presses Ctrl+M followed by Tab; with no nested
			// textarea the keyboard sequence simply advances focus to
			// the next focusable element in document order, which is
			// outside the Monaco subtree.
		</script>
	</body>
</html>
