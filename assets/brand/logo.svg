<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="HeliosLab">
  <title>HeliosLab</title>
  <desc>AI-coded vector mark: a lab flask holding a radiant sun, for a desktop lab app. Hand-authored paths.</desc>
  <defs>
    <linearGradient id="hl-bg" x1="24" y1="24" x2="488" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1305"/>
      <stop offset="1" stop-color="#33210A"/>
    </linearGradient>
    <radialGradient id="hl-sun" cx="256" cy="312" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="108" ry="108" fill="url(#hl-bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="108" ry="108" fill="none" stroke="#5A3F12" stroke-width="2"/>

  <!-- Flask outline -->
  <path d="M 222 120 L 222 214 L 138 372 C 126 396 142 424 170 424 L 342 424 C 370 424 386 396 374 372 L 290 214 L 290 120"
        fill="#0F2436" fill-opacity="0.55" stroke="#7DD3FC" stroke-width="10" stroke-linejoin="round"/>
  <!-- Flask neck rim -->
  <path d="M 204 120 L 308 120" stroke="#7DD3FC" stroke-width="12" stroke-linecap="round"/>

  <!-- Sun inside the flask (the helios payload) -->
  <circle cx="256" cy="340" r="52" fill="url(#hl-sun)"/>
  <g stroke="#FBBF24" stroke-width="8" stroke-linecap="round">
    <path d="M 256 264 L 256 282"/>
    <path d="M 312 296 L 300 308"/>
    <path d="M 200 296 L 212 308"/>
    <path d="M 332 348 L 314 348"/>
    <path d="M 180 348 L 198 348"/>
  </g>
</svg>
