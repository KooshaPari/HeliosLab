name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main, feature/*, bugfix/*, docs/*, release/*, hotfix/*]
  pull_request:
    branches: [main]
permissions:
  contents: read


env:
  CARGO_TERM_COLOR: always
jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest
        with:
          toolchain: stable
      - name: Check workspace
        run: cargo check --workspace --exclude pheno-ffi-python

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest
        with:
          toolchain: stable
          components: clippy
      - name: Run clippy
        run: >
          cargo clippy --workspace --exclude pheno-ffi-python --
          -A clippy::not_unsafe_ptr_arg_deref
          -A clippy::print_literal
          -A clippy::upper_case_acronyms
          -D warnings

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # v-latest
        with:
          toolchain: stable
      - name: Run tests
        run: cargo test --workspace --exclude pheno-ffi-python

  coverage:
    name: coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Coverage placeholder
        run: echo "Coverage is reported by the dedicated Coverage workflow."

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Secret scan placeholder
        run: echo "Secret scanning is handled by the security guard workflows."

  ci-summary:
    name: ci-summary
    runs-on: ubuntu-24.04
    needs: [typecheck, lint, unit-tests, coverage, secret-scan]
    if: always()
    steps:
      - name: Summarize CI
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more CI jobs were cancelled."
            exit 1
          fi
          echo "CI jobs completed successfully."
