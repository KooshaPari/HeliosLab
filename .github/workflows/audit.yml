name: CodeQL (Rust)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:


permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@78ed0c7291d93e40c51b085850dc669a4c3ab73b
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b
        with:
          category: "/language:rust"
