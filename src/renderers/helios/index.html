<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>helios</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .layout {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      grid-template-rows: 40px 1fr 28px;
      height: 100vh;
    }
    .topbar {
      grid-column: 1 / -1;
      background: #16213e;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #2a2a4a;
      gap: 16px;
    }
    .topbar h1 { font-size: 14px; font-weight: 600; color: #7b8cde; }
    .topbar .status { font-size: 12px; color: #888; }
    .left-rail {
      background: #1a1a2e;
      border-right: 1px solid #2a2a4a;
      padding: 12px;
      overflow-y: auto;
    }
    .center {
      background: #0f0f23;
      padding: 16px;
      overflow-y: auto;
    }
    .right-rail {
      background: #1a1a2e;
      border-left: 1px solid #2a2a4a;
      padding: 12px;
      overflow-y: auto;
    }
    .statusbar {
      grid-column: 1 / -1;
      background: #16213e;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #2a2a4a;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a5a8a;
      margin-bottom: 8px;
    }
    .tab-list { list-style: none; }
    .tab-list li {
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .tab-list li:hover { background: #2a2a4a; }
    .tab-list li.active { background: #2a2a4a; color: #7b8cde; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .card-label { font-size: 11px; color: #5a5a8a; margin-bottom: 4px; }
    .card-value { font-size: 13px; }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
