# Typo detection configuration for colab
# See: https://github.com/crate-ci/typos
#
# Extend-words: project-specific identifiers and terms that the default
# English dictionary incorrectly flags. Key matches are case-insensitive.
# Extend-exclude: paths that should not be scanned (auto-generated content,
# third-party license texts, build outputs, vendored deps).

[default.extend-words]
agileplus = "agileplus"
pheno = "pheno"
phenoctl = "phenoctl"
ratatui = "ratatui"
unparseable = "unparseable"
RTO = "RTO"

[files]
extend-exclude = [
    "*.lock",
    "*.lockb",
    "*.min.js",
    "*.min.css",
    "target/",
    "node_modules/",
    "dist/",
    "build/",
    "coverage/",
    # VitePress / generated docs (translations, generated API output)
    "docs/.vitepress/",
    "docs/fa/",
    "docs/fa-Latn/",
    "docs/zh-CN/",
    "docs/zh-TW/",
    "docs/.generated/",
    "docs/package-lock.json",
    # Third-party / auto-generated license and worker bundles
    "assets/licenses.html",
    "assets/custom.editor.worker.js",
    # Hygiene/audit reports (auto-generated by grade.sh et al.)
    ".grade-reports/",
    # Windows-only branding export (one-off, not part of CI gate)
    "tools/Export-Brand.ps1",
]
