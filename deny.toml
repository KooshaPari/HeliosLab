[graph]
always-allow-build-rt = false

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]

[bans]
version = 2
default = "deny"
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "warn"

[sources]
version = 2
unknown-registry = "deny"
unknown-git = "deny"
